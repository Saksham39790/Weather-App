
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: 2px solid #ddd;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #2f8cff;
}

#weatherResult {
    margin-top: 20px;
}

#weatherResult img {
    width: 64px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Weather App</h1>

    <input type="text" id="locationInput" placeholder="Enter city name">
    <button onclick="getWeather()">Get Weather</button>

    <div id="weatherResult"></div>
</div>

<script>
const API_KEY = "1cc0a69fb65b4593862151545260206";

async function getWeather() {
    const location = document.getElementById("locationInput").value.trim();
    const result = document.getElementById("weatherResult");

    if (!location) {
        result.innerHTML = "<p>Please enter a location.</p>";
        return;
    }

    try {
        const response = await fetch(
            `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${location}&aqi=yes`
        );

        const data = await response.json();

        if (data.error) {
            result.innerHTML = `<p>${data.error.message}</p>`;
            return;
        }

        result.innerHTML = `
            <h2>${data.location.name}, ${data.location.country}</h2>
            <img src="https:${data.current.condition.icon}" alt="Weather Icon">
            <p><strong>${data.current.temp_c}°C</strong></p>
            <p>${data.current.condition.text}</p>
            <p>Feels Like: ${data.current.feelslike_c}°C</p>
            <p>Humidity: ${data.current.humidity}%</p>
            <p>Wind: ${data.current.wind_kph} km/h</p>
        `;
    } catch (error) {
        result.innerHTML = "<p>Failed to fetch weather data.</p>";
        console.error(error);
    }
}
</script>

</body>
</html>
